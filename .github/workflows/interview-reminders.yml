name: Interview Reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call interview reminders API
        run: |
          RESPONSE=$(curl -s -L \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP_STATUS:%{http_code}" \
            "https://recruitment-ats.vercel.app/api/cron/interview-reminders")

          echo "$RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | sed 's/.*HTTP_STATUS://')

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "API returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Success: HTTP $HTTP_STATUS"