name: Interview Reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call interview reminders API
        run: |
          echo "🚀 Calling Interview Reminder API..."

          # Call API and capture HTTP status separately
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 15 \
            --retry 2 \
            https://recruitment-ats.vercel.app/api/cron/interview-reminders)

          echo "📩 Response Body:"
          cat response.json || echo "No response body"

          echo ""
          echo "📊 HTTP Status: $HTTP_STATUS"

          # Validate status code safely
          if [[ ! "$HTTP_STATUS" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid HTTP status received"
            exit 1
          fi

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ API failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Success: API executed correctly"